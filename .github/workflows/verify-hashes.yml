# Fails a push or pull request whose inline CSP hashes have drifted out of sync
# with the actual <style>/<script> blocks. See .github/scripts/verify-hashes.js
# for what "in sync" means and why it matters.
name: Verify CSP hashes

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Node is preinstalled on the runner and the script has no dependencies,
      # so there is nothing to set up or install.
      - name: Check inline CSP hashes are in sync
        run: node .github/scripts/verify-hashes.js
